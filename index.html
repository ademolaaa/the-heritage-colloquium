<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Heritage Colloquium</title>
    <script>
      (() => {
        try {
          const key = 'heritage.theme';
          const stored = localStorage.getItem(key);
          const theme = stored === 'dark' || stored === 'light' ? stored : 'dark';
          document.documentElement.classList.toggle('dark', theme === 'dark');
        } catch {}
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              serif: ['"Playfair Display"', 'serif'],
              display: ['"Cinzel"', 'serif'],
              sans: ['"Inter"', 'sans-serif'],
            },
            boxShadow: {
              'gold-glow': '0 22px 70px -28px rgba(212,175,55,0.55)',
              'deep': '0 40px 120px -70px rgba(0,0,0,0.95)',
            },
            colors: {
              obsidian: 'rgb(var(--c-obsidian) / <alpha-value>)',
              charcoal: 'rgb(var(--c-charcoal) / <alpha-value>)',
              gold: {
                100: '#FBF5E5',
                200: '#F2E2B5',
                300: '#E8CE84',
                400: '#DEC062',
                500: '#D4AF37', // Classic Gold
                600: '#AA8C2C',
                700: '#806921',
                800: '#554616',
                900: '#2B230B',
              },
              offwhite: 'rgb(var(--c-offwhite) / <alpha-value>)',
              gray: {
                300: 'rgb(var(--c-gray-300) / <alpha-value>)',
                400: 'rgb(var(--c-gray-400) / <alpha-value>)',
                500: 'rgb(var(--c-gray-500) / <alpha-value>)',
                600: 'rgb(var(--c-gray-600) / <alpha-value>)',
                700: 'rgb(var(--c-gray-700) / <alpha-value>)',
                800: 'rgb(var(--c-gray-800) / <alpha-value>)',
                900: 'rgb(var(--c-gray-900) / <alpha-value>)',
              },
            },
            backgroundImage: {
              'pattern-subtle': "url('data:image/svg+xml,%3Csvg width=\\'60\\' height=\\'60\\' viewBox=\\'0 0 60 60\\' xmlns=\\'http://www.w3.org/2000/svg\\'%3E%3Cg fill=\\'none\\' fill-rule=\\'evenodd\\'%3E%3Cg fill=\\'%23D4AF37\\' fill-opacity=\\'0.03\\'%3E%3Cpath d=\\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E')",
              'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
            },
            animation: {
              'slow-spin': 'spin 20s linear infinite',
              'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: 0, transform: 'translateY(20px)' },
                '100%': { opacity: 1, transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        color-scheme: light;
        --c-obsidian: 250 248 244;
        --c-charcoal: 255 255 255;
        --c-offwhite: 2 6 23;
        --c-gray-300: 71 85 105;
        --c-gray-400: 51 65 85;
        --c-gray-500: 30 41 59;
        --c-gray-600: 15 23 42;
        --c-gray-700: 2 6 23;
        --c-gray-800: 2 6 23;
        --c-gray-900: 2 6 23;
      }

      html.dark {
        color-scheme: dark;
        --c-obsidian: 5 5 5;
        --c-charcoal: 15 15 15;
        --c-offwhite: 240 240 240;
        --c-gray-300: 209 213 219;
        --c-gray-400: 156 163 175;
        --c-gray-500: 107 114 128;
        --c-gray-600: 75 85 99;
        --c-gray-700: 55 65 81;
        --c-gray-800: 31 41 55;
        --c-gray-900: 17 24 39;
      }

      body {
        background: radial-gradient(1200px 700px at 50% -10%, rgba(212,175,55,0.07), transparent 55%),
          radial-gradient(900px 600px at 8% 20%, rgba(255,255,255,0.04), transparent 52%),
          radial-gradient(900px 600px at 92% 18%, rgba(255,255,255,0.03), transparent 55%),
          rgb(var(--c-obsidian));
        color: rgb(var(--c-offwhite));
        overflow-x: hidden;
      }

      html:not(.dark) body {
        background: radial-gradient(1100px 700px at 50% -18%, rgba(212,175,55,0.14), transparent 55%),
          radial-gradient(900px 650px at 14% 10%, rgba(15,23,42,0.06), transparent 58%),
          radial-gradient(900px 650px at 88% 12%, rgba(15,23,42,0.04), transparent 60%),
          rgb(var(--c-obsidian));
      }

      html:not(.dark) .text-white {
        color: rgb(var(--c-offwhite));
      }

      html:not(.dark) .border-white\/5 {
        border-color: rgba(2, 6, 23, 0.10);
      }

      html:not(.dark) .border-white\/10 {
        border-color: rgba(2, 6, 23, 0.14);
      }

      html:not(.dark) .border-white\/20 {
        border-color: rgba(2, 6, 23, 0.18);
      }

      html:not(.dark) .bg-black {
        background-color: rgb(241, 245, 249);
      }

      html:not(.dark) .font-light {
        font-weight: 400 !important;
      }

      /* Film Grain Texture */
      .bg-noise {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 50;
        opacity: 0.05;
        mix-blend-mode: overlay;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      html:not(.dark) .bg-noise {
        opacity: 0.035;
        mix-blend-mode: multiply;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgb(var(--c-obsidian));
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(2, 6, 23, 0.35);
        border-radius: 999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #D4AF37;
      }
      ::selection {
        background: #D4AF37;
        color: #000;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
